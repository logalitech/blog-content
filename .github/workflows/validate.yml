name: Validate content

# Puerta de calidad del PR: valida el frontmatter/esquema de cada post
# (campos obligatorios, lang↔carpeta, fecha válida). Autónomo: sin secretos ni
# acceso a otros repos → seguro en repo público. El render MDX final lo
# garantiza el build del deploy (que nunca publica si algo falla).

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar contenido
        run: node scripts/validate.mjs
